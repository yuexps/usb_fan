<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USB 继电器温控系统</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <main class="dashboard-grid">
            <!-- 左侧：实时状态与仪表盘 -->
            <section class="card status-card">
                <div class="card-header">
                    <h2>实时状态监测</h2>
                    <span id="debounce-badge" class="badge badge-debounce" style="opacity: 0; pointer-events: none;">超限</span>
                </div>

                <div class="temp-gauge-container">
                    <!-- 温度圆环仪表盘 -->
                    <div class="gauge-wrapper">
                        <svg class="gauge-svg" viewBox="0 0 120 120">
                            <defs>
                                <linearGradient id="grad-cool" x1="0%" y1="100%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#06b6d4" />
                                    <stop offset="100%" stop-color="#3b82f6" />
                                </linearGradient>
                                <linearGradient id="grad-warm" x1="0%" y1="100%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#f59e0b" />
                                    <stop offset="100%" stop-color="#f97316" />
                                </linearGradient>
                                <linearGradient id="grad-hot" x1="0%" y1="100%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#ef4444" />
                                    <stop offset="100%" stop-color="#ec4899" />
                                </linearGradient>
                            </defs>
                            <circle class="gauge-track-outer" cx="60" cy="60" r="56"></circle>
                            <circle class="gauge-ticks" cx="60" cy="60" r="55"></circle>
                            <circle class="gauge-center-bg" cx="60" cy="60" r="43"></circle>
                            <circle class="gauge-bg" cx="60" cy="60" r="50"></circle>
                            <circle id="zone-lower" class="gauge-zone" cx="60" cy="60" r="50" />
                            <circle id="zone-mid" class="gauge-zone" cx="60" cy="60" r="50" />
                            <circle id="zone-upper" class="gauge-zone" cx="60" cy="60" r="50" />
                            <circle id="gauge-fill" class="gauge-fill" cx="60" cy="60" r="50"></circle>
                            <circle class="gauge-track-inner" cx="60" cy="60" r="44"></circle>
                        </svg>
                        <div class="gauge-info">
                            <span id="temp-display" class="temp-val">--</span>
                            <span class="temp-unit">℃</span>
                        </div>
                    </div>
                </div>

                <div class="info-list">
                    <div class="info-item">
                        <span class="info-label">温度监测源</span>
                        <span id="temp-source" class="info-value text-unknown">加载中</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">继电器状态</span>
                        <span id="relay-status" class="info-value text-unknown">加载中</span>
                    </div>
                </div>
            </section>

            <!-- 右侧：设备控制中心 -->
            <div class="control-column">
                <section class="card control-card">
                    <div class="card-header">
                        <h2>设备控制中心</h2>
                        <span id="conn-badge" class="badge badge-offline">已断开</span>
                    </div>

                    <!-- 运行模式 -->
                    <div style="margin-bottom: 20px;">
                        <div class="mode-selector">
                            <button id="btn-mode-auto" class="btn-mode">自动温控</button>
                            <button id="btn-mode-manual" class="btn-mode">手动控制</button>
                        </div>
                    </div>

                    <!-- 手动开关控制 (自动模式下此区域将置灰锁定) -->
                    <div id="manual-control-section"
                        style="padding: 16px; background: rgba(15, 23, 42, 0.02); border: 1px solid rgba(15, 23, 42, 0.03); border-radius: 16px; margin-bottom: 20px;">
                        <div class="control-btn-group" style="margin-bottom: 0;">
                            <button id="btn-fan-open" class="btn btn-open">开启继电器</button>
                            <button id="btn-fan-close" class="btn btn-close">关闭继电器</button>
                        </div>
                    </div>

                    <!-- 系统参数配置 -->
                    <div>
                        <button id="btn-open-config" class="btn btn-config-toggle">系统参数配置</button>
                    </div>
                </section>
            </div>
        </main>

        <!-- 悬浮通知弹窗 -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- 配置弹窗 -->
    <div id="config-modal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2>系统参数配置</h2>
                <button id="btn-close-modal" class="btn-close-x">&times;</button>
            </div>
            <div class="modal-body">
                <form id="form-system-config" onsubmit="return false;">
                    <!-- 温控防抖配置 -->
                    <div class="form-section">
                        <h3>温控防抖配置</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="modal-input-ceiling">温度上限 (℃)</label>
                                <input type="number" id="modal-input-ceiling" step="0.1" min="0" max="100"
                                    placeholder="如 55.0" required>
                            </div>
                            <div class="form-group">
                                <label for="modal-input-floor">温度下限 (℃)</label>
                                <input type="number" id="modal-input-floor" step="0.1" min="0" max="100"
                                    placeholder="如 50.0" required>
                            </div>
                            <div class="form-group">
                                <label for="modal-input-min-run">最少运行时间 (秒)</label>
                                <input type="number" id="modal-input-min-run" min="5" max="3600" placeholder="如 30"
                                    required>
                            </div>
                            <div class="form-group">
                                <label for="modal-input-filter-window">消抖判定次数 (次)</label>
                                <input type="number" id="modal-input-filter-window" min="1" max="10" placeholder="如 3"
                                    required>
                            </div>
                        </div>
                    </div>

                    <!-- 硬件与采集配置 -->
                    <div class="form-section">
                        <h3>硬件与采集配置</h3>
                        <div id="hw-group" class="form-grid">
                            <div class="form-group">
                                <label for="modal-input-poll-interval">温度采集间隔 (秒)</label>
                                <input type="number" id="modal-input-poll-interval" min="1" max="60" placeholder="如 3"
                                    required>
                            </div>
                            <div class="form-group">
                                <label for="modal-input-serial-port">串口设备</label>
                                <select id="modal-input-serial-port" required></select>
                            </div>
                            <div class="form-group">
                                <label for="modal-input-baud-rate">波特率</label>
                                <input type="number" id="modal-input-baud-rate" placeholder="如 9600" required>
                            </div>
                            <div class="form-group">
                                <label for="modal-input-temp-path">温度传感器</label>
                                <select id="modal-input-temp-path" required></select>
                            </div>
                        </div>
                        <div class="form-group switch-group"
                            style="margin-top: 20px; flex-direction: row; align-items: center; justify-content: space-between;">
                            <span
                                style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">启用指令状态反馈</span>
                            <label class="switch">
                                <input type="checkbox" id="modal-input-has-feedback">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <!-- 继电器控制协议配置 -->
                    <div class="form-section">
                        <h3>继电器协议配置</h3>

                        <!-- 无反馈操作码配置组 -->
                        <div id="nofeed-group" class="form-grid">
                            <div class="form-group">
                                <label for="modal-input-op-open-nofeed">无反馈开启指令 (Hex)</label>
                                <input type="text" id="modal-input-op-open-nofeed" placeholder="如 A00101A2">
                            </div>
                            <div class="form-group">
                                <label for="modal-input-op-close-nofeed">无反馈关闭指令 (Hex)</label>
                                <input type="text" id="modal-input-op-close-nofeed" placeholder="如 A00100A1">
                            </div>
                        </div>

                        <!-- 有反馈操作码配置组 -->
                        <div id="feed-group" class="form-grid">
                            <div class="form-group">
                                <label for="modal-input-op-open-feed">有反馈开启指令 (Hex)</label>
                                <input type="text" id="modal-input-op-open-feed" placeholder="如 A00103A4">
                            </div>
                            <div class="form-group">
                                <label for="modal-input-op-close-feed">有反馈关闭指令 (Hex)</label>
                                <input type="text" id="modal-input-op-close-feed" placeholder="如 A00102A3">
                            </div>
                            <div class="form-group">
                                <label for="modal-input-op-toggle-feed">状态翻转指令 (Hex)</label>
                                <input type="text" id="modal-input-op-toggle-feed" placeholder="如 A00104A5">
                            </div>
                            <div class="form-group">
                                <label for="modal-input-op-query">状态查询指令 (Hex)</label>
                                <input type="text" id="modal-input-op-query" placeholder="如 A00105A6">
                            </div>
                            <div class="form-group">
                                <label for="modal-input-status-on">开启回执特征码 (Hex)</label>
                                <input type="text" id="modal-input-status-on" placeholder="如 A00101A2">
                            </div>
                            <div class="form-group">
                                <label for="modal-input-status-off">关闭回执特征码 (Hex)</label>
                                <input type="text" id="modal-input-status-off" placeholder="如 A00100A1">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="btn-cancel-config" class="btn btn-secondary">取消</button>
                <button type="button" id="btn-save-config" class="btn btn-primary">保存配置</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
