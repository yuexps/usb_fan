<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USB 继电器温控系统</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <main class="dashboard-grid">
            <!-- 左侧：实时状态与仪表盘 -->
            <section class="card status-card">
                <div class="card-header">
                    <h2>实时状态监测</h2>
                    <span id="connection-badge" class="badge badge-online">连接正常</span>
                </div>

                <div class="temp-gauge-container">
                    <!-- 温度圆环仪表盘 -->
                    <div class="gauge-wrapper">
                        <svg class="gauge-svg" viewBox="0 0 120 120">
                            <circle class="gauge-bg" cx="60" cy="60" r="50"></circle>
                            <circle id="gauge-fill" class="gauge-fill" cx="60" cy="60" r="50"></circle>
                        </svg>
                        <div class="gauge-info">
                            <span id="temp-display" class="temp-val">--</span>
                            <span class="temp-unit">℃</span>
                        </div>
                    </div>
                </div>

                <div class="info-list">
                    <div class="info-item">
                        <span class="info-label">继电器状态</span>
                        <span id="relay-status" class="info-value text-unknown">加载中...</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">当前运行模式</span>
                        <span id="mode-status" class="info-value text-unknown">加载中...</span>
                    </div>
                </div>
            </section>

            <!-- 右侧：控制中心 -->
            <div class="control-column">
                <!-- 运行模式与温控参数 -->
                <section class="card config-card">
                    <h2>运行模式与温控参数</h2>
                    <div class="mode-selector">
                        <button id="btn-mode-auto" class="btn-mode">自动温控</button>
                        <button id="btn-mode-manual" class="btn-mode">手动控制</button>
                    </div>

                    <div style="margin-top: 20px;">
                        <button id="btn-open-config" class="btn btn-config-toggle">系统参数配置</button>
                    </div>
                </section>

                <!-- 手动开关控制 -->
                <section class="card manual-card" id="manual-control-section">
                    <h2>手动继电器控制</h2>
                    <div class="control-btn-group">
                        <button id="btn-fan-open" class="btn btn-open">开启继电器</button>
                        <button id="btn-fan-close" class="btn btn-close">关闭继电器</button>
                    </div>
                    <button id="btn-fan-query" class="btn btn-query">
                        <span class="btn-text">手动查询硬件状态</span>
                        <span class="spinner" id="query-spinner"></span>
                    </button>
                </section>
            </div>
        </main>

        <!-- 悬浮通知弹窗 -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- 配置弹窗 -->
    <div id="config-modal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2>系统参数配置</h2>
                <button id="btn-close-modal" class="btn-close-x">&times;</button>
            </div>
            <div class="modal-body">
                <form id="form-system-config" onsubmit="return false;">
                    <!-- 温控防抖配置 -->
                    <div class="form-section">
                        <h3>温控防抖配置</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="modal-input-ceiling">温度上限 (℃)</label>
                                <input type="number" id="modal-input-ceiling" step="0.1" min="0" max="100" placeholder="如 55.0" required>
                            </div>
                            <div class="form-group">
                                <label for="modal-input-floor">温度下限 (℃)</label>
                                <input type="number" id="modal-input-floor" step="0.1" min="0" max="100" placeholder="如 50.0" required>
                            </div>
                            <div class="form-group">
                                <label for="modal-input-min-run">最少运行时间 (秒)</label>
                                <input type="number" id="modal-input-min-run" min="5" max="3600" placeholder="如 30" required>
                            </div>
                            <div class="form-group">
                                <label for="modal-input-filter-window">平滑窗口大小 (次)</label>
                                <input type="number" id="modal-input-filter-window" min="1" max="10" placeholder="如 3" required>
                            </div>
                        </div>
                    </div>

                    <!-- 硬件与采集配置 -->
                    <div class="form-section">
                        <h3>硬件与采集配置</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="modal-input-poll-interval">温度采集间隔 (秒)</label>
                                <input type="number" id="modal-input-poll-interval" min="1" max="60" placeholder="如 3" required>
                            </div>
                            <div class="form-group">
                                <label for="modal-input-serial-port">串口设备路径</label>
                                <input type="text" id="modal-input-serial-port" placeholder="如 /dev/ttyUSB0" required>
                            </div>
                            <div class="form-group">
                                <label for="modal-input-baud-rate">波特率</label>
                                <input type="number" id="modal-input-baud-rate" placeholder="如 9600" required>
                            </div>
                            <div class="form-group">
                                <label for="modal-input-temp-path">温度文件路径</label>
                                <input type="text" id="modal-input-temp-path" placeholder="如 /sys/class/thermal/thermal_zone1/temp">
                            </div>
                        </div>
                        <div class="form-group switch-group" style="margin-top: 20px; flex-direction: row; align-items: center; justify-content: space-between;">
                            <span style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">启用指令状态反馈</span>
                            <label class="switch">
                                <input type="checkbox" id="modal-input-has-feedback">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <!-- 继电器控制协议配置 -->
                    <div class="form-section">
                        <h3>继电器协议配置</h3>
                        
                        <!-- 无反馈操作码配置组 -->
                        <div id="nofeed-group" class="form-grid">
                            <div class="form-group">
                                <label for="modal-input-op-open-nofeed">无反馈开启指令码</label>
                                <input type="text" id="modal-input-op-open-nofeed" placeholder="如 A00101A2">
                            </div>
                            <div class="form-group">
                                <label for="modal-input-op-close-nofeed">无反馈关闭指令码</label>
                                <input type="text" id="modal-input-op-close-nofeed" placeholder="如 A00100A1">
                            </div>
                        </div>

                        <!-- 有反馈操作码配置组 -->
                        <div id="feed-group" class="form-grid">
                            <div class="form-group">
                                <label for="modal-input-op-open-feed">有反馈开启指令码</label>
                                <input type="text" id="modal-input-op-open-feed" placeholder="如 A00103A4">
                            </div>
                            <div class="form-group">
                                <label for="modal-input-op-close-feed">有反馈关闭指令码</label>
                                <input type="text" id="modal-input-op-close-feed" placeholder="如 A00102A3">
                            </div>
                            <div class="form-group">
                                <label for="modal-input-op-toggle-feed">指令状态反转码</label>
                                <input type="text" id="modal-input-op-toggle-feed" placeholder="如 A00104A5">
                            </div>
                            <div class="form-group">
                                <label for="modal-input-op-query">硬件状态查询码</label>
                                <input type="text" id="modal-input-op-query" placeholder="如 A00105A6">
                            </div>
                            <div class="form-group">
                                <label for="modal-input-status-on">状态开启判定值</label>
                                <input type="text" id="modal-input-status-on" placeholder="如 A00101A2">
                            </div>
                            <div class="form-group">
                                <label for="modal-input-status-off">状态关闭判定值</label>
                                <input type="text" id="modal-input-status-off" placeholder="如 A00100A1">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="btn-cancel-config" class="btn btn-secondary">取消</button>
                <button type="button" id="btn-save-config" class="btn btn-primary">保存配置</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
